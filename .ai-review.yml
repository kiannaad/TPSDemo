# AI code reviewer project rules.
# This file intentionally uses a small YAML subset consumed by tools/ai_code_reviewer.py.

review:
  fail_on:
    - blocking
  max_major_before_fail: 3

limits:
  max_patch_chars: 60000
  max_file_patch_chars: 12000

paths:
  ignore:
    - "Doc/**"
    - "tools/**"
    - ".git/**"
    - ".idea/**"
    - ".vscode/**"
    - "Library/**"
    - "Temp/**"
    - "Logs/**"
    - "obj/**"
    - "UserSettings/**"
    - "Assets/YooAsset/**"
    - "Assets/Character Controller Pro/**"
    - "Assets/KinematicCharacterController/**"
    - "*.generated.cs"
    - "*.meta"
  require_tests_for:
    - "server/src/**"
    - "Assets/Script/**"

style:
  language: "zh-CN"
  strictness: "medium"
