name: AI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Review changed diff
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout base repository
        uses: actions/checkout@v5

      - name: Run AI code reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.AI_REVIEW_API_KEY || secrets.OPENAI_API_KEY }}
          AI_REVIEW_BASE_URL: ${{ secrets.AI_REVIEW_BASE_URL }}
          AI_REVIEW_MODEL: ${{ secrets.AI_REVIEW_MODEL || vars.AI_REVIEW_MODEL || 'gpt-4o-mini' }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || '' }}
        run: python .github/scripts/ai_code_reviewer.py
